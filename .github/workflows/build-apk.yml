name: Build Flutter APK

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          
      - name: Create New Flutter Project and Inject main.dart
        run: |
          flutter create temp_app --org com.dojo.owner --project-name dojo_owner_app
          cd temp_app
          # Remove default main.dart and copy our repository's main.dart into it
          rm lib/main.dart
          cp ../main.dart lib/main.dart
          
          # Build APK from this complete project
          flutter build apk --release
          
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: temp_app/build/app/outputs/flutter-apk/app-release.apk
